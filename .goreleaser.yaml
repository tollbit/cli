version: 2

project_name: tollbit

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: tollbit
    main: ./cmd/tollbit
    binary: tollbit
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: tollbit-archives
    ids:
      - tollbit
    name_template: "tollbit_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "tollbit_{{ .Version }}_checksums.txt"

# Allow re-running a tag release (e.g. after fixing npm publish) without 422s on existing assets.
release:
  replace_existing_artifacts: true
  mode: replace

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
