version: 2

project_name: tollbit

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: tollbit
    main: ./cmd/tollbit
    binary: tollbit
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: tollbit-archives
    ids:
      - tollbit
    name_template: "tollbit_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "tollbit_{{ .Version }}_checksums.txt"

# Binaries and checksums are published on the public distribution repo (not the private source repo).
release:
  github:
    owner: tollbit
    name: tollbit-cli-releases

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
