version: 2

project_name: tollbit

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: tollbit
    main: ./cmd/tollbit
    binary: tollbit
    # No `-tags dev`: release binaries MUST be the locked-down build (pinned
    # endpoints, no development-config merge). Never add the dev tag here.
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: tollbit-archives
    ids:
      - tollbit
    name_template: "tollbit_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "tollbit_{{ .Version }}_checksums.txt"

# Published artifacts are immutable: re-running a release keeps existing assets
# rather than overwriting them (checksums included). To fix a bad release, cut a
# new version — do not mutate a published one. Mirrors the immutable tag ruleset.
release:
  mode: keep-existing

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
