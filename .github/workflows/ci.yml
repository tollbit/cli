name: ci

# pull_request: PR opened + every push to the PR branch (single run per event).
# push (main only): runs after merges to the default branch — avoids duplicating pull_request
# when both fire on the same commit pushed to a PR branch.
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tags: ["", "dev"]
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test -tags '${{ matrix.tags }}' ./...
