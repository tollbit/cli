name: ci

# pull_request: PR opened + every push to the PR branch (single run per event).
# push (main only): runs after merges to the default branch — avoids duplicating pull_request
# when both fire on the same commit pushed to a PR branch.
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tags: ["", "dev"]
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test -tags '${{ matrix.tags }}' ./...

  notices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      # Fails if THIRD-PARTY-NOTICES.md is out of date vs the current deps.
      - name: Verify THIRD-PARTY-NOTICES.md is up to date
        run: |
          go mod download
          make third-party-notices
          if ! git diff --exit-code THIRD-PARTY-NOTICES.md; then
            echo "::error::THIRD-PARTY-NOTICES.md is out of date. Run 'make third-party-notices' and commit the result."
            exit 1
          fi
