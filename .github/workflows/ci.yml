name: ci

# pull_request: PR opened + every push to the PR branch (single run per event).
# push (main only): runs after merges to the default branch — avoids duplicating pull_request
# when both fire on the same commit pushed to a PR branch.
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tags: ["", "dev"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test -tags '${{ matrix.tags }}' ./...
