# Publishes GitHub Releases on this repo and the @tollbit/tollbit-cli npm package
# when a version tag (v*) is pushed.
name: release

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Publishes GitHub Releases on this repo (tollbit/cli).
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    needs: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Node 24 ships npm >= 11.5.1, required for Trusted Publishing (OIDC).
      # Do not set registry-url: setup-node would write an empty _authToken line
      # that short-circuits OIDC and surfaces as a misleading E404 on publish.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set npm package version from git tag
        working-directory: npm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      # Trusted publishing (OIDC): no NPM_TOKEN / NODE_AUTH_TOKEN required.
      - name: Publish npm package
        working-directory: npm
        run: npm publish --provenance --access public
