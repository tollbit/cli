# Publishes GitHub Releases on this repo and the @tollbit/tollbit-cli npm package
# when a version tag (v*) is pushed.
name: release

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # GoReleaser uploads the GitHub Release
      id-token: write      # keyless (sigstore) signing for build provenance
      attestations: write  # record the provenance attestation
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Verify tag matches version.go
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CODE="$(sed -n 's/^const Version = "\(.*\)"/\1/p' internal/version/version.go)"
          if [ -z "$CODE" ]; then
            echo "error: could not read Version from internal/version/version.go"
            exit 1
          fi
          if [ "$TAG" != "$CODE" ]; then
            echo "error: git tag '${GITHUB_REF_NAME}' does not match internal/version/version.go (${CODE})"
            echo "tag the commit that contains the matching Version const (see make tag)"
            exit 1
          fi
          echo "ok: tag ${GITHUB_REF_NAME} matches version.go (${CODE})"

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      # Publishes GitHub Releases on this repo (tollbit/cli).
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Signs the built archives with keyless sigstore provenance, verifiable
      # with `gh attestation verify <archive> --repo tollbit/cli`.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: "dist/*.tar.gz,dist/*.zip"

  npm-publish:
    needs: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # Node 24 ships npm >= 11.5.1, required for Trusted Publishing (OIDC).
      # Do not set registry-url: setup-node would write an empty _authToken line
      # that short-circuits OIDC and surfaces as a misleading E404 on publish.
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"

      - name: Set npm package version from git tag
        working-directory: npm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      # Trusted publishing (OIDC): no NPM_TOKEN / NODE_AUTH_TOKEN required.
      - name: Publish npm package
        working-directory: npm
        run: npm publish --provenance --access public
