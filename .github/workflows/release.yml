# Publishes GitHub Releases on this repo and the @tollbit/tollbit-cli npm package
# when a version tag (v*) is pushed.
name: release

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          fetch-depth: 0

      - name: Verify tag matches version.go
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CODE="$(sed -n 's/^const Version = "\(.*\)"/\1/p' internal/version/version.go)"
          if [ -z "$CODE" ]; then
            echo "error: could not read Version from internal/version/version.go"
            exit 1
          fi
          if [ "$TAG" != "$CODE" ]; then
            echo "error: git tag '${GITHUB_REF_NAME}' does not match internal/version/version.go (${CODE})"
            echo "tag the commit that contains the matching Version const (see make tag)"
            exit 1
          fi
          echo "ok: tag ${GITHUB_REF_NAME} matches version.go (${CODE})"

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      # Publishes GitHub Releases on this repo (tollbit/cli).
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    needs: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      # Node 24 ships npm >= 11.5.1, required for Trusted Publishing (OIDC).
      # Do not set registry-url: setup-node would write an empty _authToken line
      # that short-circuits OIDC and surfaces as a misleading E404 on publish.
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"

      - name: Set npm package version from git tag
        working-directory: npm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      # Trusted publishing (OIDC): no NPM_TOKEN / NODE_AUTH_TOKEN required.
      - name: Publish npm package
        working-directory: npm
        run: npm publish --provenance --access public
