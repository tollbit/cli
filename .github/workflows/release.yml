# Release pipeline DISABLED — restore automatic releases when the repo is public:
# uncomment `on.push.tags` below and remove `if: false` from each job.
name: release

on:
  workflow_dispatch: {}
  # push:
  #   tags:
  #     - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    if: false # release pipeline disabled
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Publishes GitHub Releases on this repo (tollbit/cli).
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    if: false # release pipeline disabled
    needs: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set npm package version from git tag
        working-directory: npm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      # Trusted publishing (OIDC): no NPM_TOKEN secret required once npm trust is configured.
      - name: Publish npm package
        working-directory: npm
        run: npm publish --provenance --access public
